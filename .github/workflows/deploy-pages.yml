# Deploiement du frontend AfriBench sur GitHub Pages
#
# Se declenche automatiquement a chaque push sur main,
# et peut etre lance manuellement depuis l'onglet Actions.
#
# Deploie le dossier frontend/ sur la branche gh-pages,
# qui est configuree comme source GitHub Pages.
#
# URL : https://ytilikan.github.io/AfriBench/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Export frontend data
        run: python scripts/export_frontend.py

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'afribench-bot'
          user_email: 'bot@afribench.dev'
