# Deploiement du frontend AfriBench sur GitHub Pages
#
# Se declenche automatiquement a chaque push sur main,
# et peut etre lance manuellement depuis l'onglet Actions.
#
# Steps :
# 1. Extrait le code
# 2. Exporte les donnees (questions + resultats) pour le frontend
# 3. Configure GitHub Pages
# 4. Upload l'artefact (dossier frontend/)
# 5. Deploie sur GitHub Pages
#
# URL apres deploiement :
#   https://<org>.github.io/AfriBench/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permet un seul deploiement a la fois
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Export frontend data
        run: python scripts/export_frontend.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
